name: Build Java Plugin

on:
  push:
    branches: [ "main" ] # Triggers every time you push code to your main branch
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    - name: Upload Finished JAR
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Plugin
        path: target/*.jar
