server-id: "smp-1"
server-role: "SMP"
job:
  interval-ticks: 20
  decay-interval-ticks: 200
sync:
  enabled: true
  channel: "cortex:sync"
announcements:
  enabled: true
  interval-minutes: 60
  template: "&cCortex &7has banned &e%count% &7players over the past 24 hours."
punishments:
  command: "ban %player% Cortex AntiCheat: %check%"
  violation-threshold: 12
checks:
  movement:
    max-horizontal-blocks-per-second: 12.5
    max-vertical-delta: 1.35
  combat:
    max-cps: 18
    max-reach: 3.45
  packet:
    max-arm-swing-packets-per-second: 25
    max-interact-packets-per-second: 30
